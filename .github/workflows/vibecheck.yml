name: vibecheck

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  vibecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ripgrep
        run: |
          curl -LO https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep_14.1.1-1_amd64.deb
          sudo dpkg -i ripgrep_14.1.1-1_amd64.deb

      - name: Install vibecheck
        run: pip install git+https://github.com/qinnovates/crazy-slop-stopper.git

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run vibecheck
        id: scan
        continue-on-error: true
        run: |
          vibecheck . --json --severity medium > /tmp/vibecheck-results.json 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let results;
            try {
              results = JSON.parse(fs.readFileSync('/tmp/vibecheck-results.json', 'utf8'));
            } catch (e) {
              // Scan errored out — post a warning
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ **vibecheck** failed to run. Check the workflow logs.'
              });
              return;
            }

            const { summary, findings, passed } = results;

            if (findings.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '### vibecheck: PASSED',
                  '',
                  `Scanned with ${summary.rules_run} rules. No findings at medium severity or above.`,
                  '',
                  '---',
                  '<sub>crazy-slop-stopper by <a href="https://github.com/qinnovates">qinnovates</a></sub>'
                ].join('\n')
              });
              return;
            }

            // Group findings by severity
            const bySeverity = {};
            for (const f of findings) {
              if (!bySeverity[f.severity]) bySeverity[f.severity] = [];
              bySeverity[f.severity].push(f);
            }

            const severityOrder = ['critical', 'high', 'medium', 'low'];
            const severityEmoji = { critical: '🔴', high: '🟡', medium: '🔵', low: '⚪' };

            let body = `### vibecheck: ${passed ? 'PASSED' : 'FAILED'}\n\n`;
            body += `| Severity | Count |\n|----------|-------|\n`;
            for (const sev of severityOrder) {
              const count = (bySeverity[sev] || []).length;
              if (count > 0) {
                body += `| ${severityEmoji[sev]} ${sev} | ${count} |\n`;
              }
            }

            body += `\n<details>\n<summary>Findings (${findings.length})</summary>\n\n`;

            for (const sev of severityOrder) {
              const group = bySeverity[sev] || [];
              if (group.length === 0) continue;

              body += `#### ${severityEmoji[sev]} ${sev.toUpperCase()}\n\n`;
              for (const f of group.slice(0, 25)) {
                const file = f.file.replace(process.env.GITHUB_WORKSPACE + '/', '');
                body += `- **${f.rule_id}** ${f.name} — \`${file}:${f.line}\`\n`;
                if (f.content) {
                  const trimmed = f.content.trim().substring(0, 100);
                  body += `  \`\`\`\n  ${trimmed}\n  \`\`\`\n`;
                }
              }
              if (group.length > 25) {
                body += `\n_...and ${group.length - 25} more ${sev} findings_\n`;
              }
              body += '\n';
            }

            body += `</details>\n\n`;
            body += `---\n<sub>crazy-slop-stopper by <a href="https://github.com/qinnovates">qinnovates</a></sub>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if critical or high
        if: steps.scan.outputs.exit_code == '1'
        run: exit 1
